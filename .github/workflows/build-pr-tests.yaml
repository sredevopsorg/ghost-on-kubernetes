name: Build tests

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, edited]
    branches:
      - main
    paths:
      - Dockerfile
      - Dockerfile-dev.dockerfile
      - Dockerfile-docker.dockerfile
      - entrypoint.js

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Fetch full history for git diff to work correctly on PRs
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver-opts: |
            network=host

      - name: Gets GHOST_VERSION
        continue-on-error: false
        id: versions
        run: |
          echo "GHOST_VERSION=$(curl -s https://api.github.com/repos/tryghost/ghost/releases/latest | jq '.name' | sed 's/\"//g')" >> $GITHUB_OUTPUT

      - name: Show GHOST_VERSION
        continue-on-error: true
        run: echo ${{ steps.versions.outputs.GHOST_VERSION }}

      - name: 🔍 Check for Dockerfile Changes using Git Diff
        id: check_files
        # Only run this file-checking logic for Pull Request events
        if: github.event_name == 'pull_request'
        run: |
          # Get the comparison commit for the PR (base vs head)
          BASE_REF=${{ github.event.pull_request.base.sha }}
          HEAD_REF=${{ github.sha }}

          echo "Comparing $BASE_REF with $HEAD_REF"

          # Check if Dockerfile was modified
          if git diff --name-only $BASE_REF $HEAD_REF | grep -q "^Dockerfile$"; then
            echo "Dockerfile was modified."
            echo "DOCKERFILE_MODIFIED=true" >> $GITHUB_OUTPUT
          else
            echo "Dockerfile was NOT modified."
          fi

          # Check if Dockerfile-dev.dockerfile was modified
          if git diff --name-only $BASE_REF $HEAD_REF | grep -q "^Dockerfile-dev.dockerfile$"; then
            echo "Dockerfile-dev.dockerfile was modified."
            echo "DOCKERFILE_DEV_MODIFIED=true" >> $GITHUB_OUTPUT
          else
            echo "Dockerfile-dev.dockerfile was NOT modified."
          fi

          # Check if Dockerfile-docker.dockerfile was modified
          if git diff --name-only $BASE_REF $HEAD_REF | grep -q "^Dockerfile-docker.dockerfile$"; then
            echo "Dockerfile-docker.dockerfile was modified."
            echo "DOCKERFILE_DOCKER_MODIFIED=true" >> $GITHUB_OUTPUT
          else
            echo "Dockerfile-docker.dockerfile was NOT modified."
          fi

      # --- Conditional Build Stages ---

      - name: Build Production Image (if Dockerfile changed)
        # Use the bash output for conditional check
        if: github.event_name == 'workflow_dispatch' || steps.check_files.outputs.DOCKERFILE_MODIFIED == 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        id: build-test
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha
          push: false
          build-args: GHOST_VERSION=${{ steps.versions.outputs.GHOST_VERSION }}

      - name: Build Development Image (if Dockerfile-dev.dockerfile changed)
        # Use the bash output for conditional check
        if: github.event_name == 'workflow_dispatch' || steps.check_files.outputs.DOCKERFILE_DEV_MODIFIED == 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        id: build-dev-test
        with:
          context: .
          file: ./Dockerfile-dev.dockerfile
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha
          push: false
          build-args: GHOST_VERSION=${{ steps.versions.outputs.GHOST_VERSION }}


      - name: Build Docker Image (if Dockerfile-docker.dockerfile changed)
        # Use the bash output for conditional check
        if: github.event_name == 'workflow_dispatch' || steps.check_files.outputs.DOCKERFILE_DOCKER_MODIFIED == 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        id: build-docker-test
        with:
          context: .
          file: ./Dockerfile-docker.dockerfile
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha
          push: false
          build-args: GHOST_VERSION=${{ steps.versions.outputs.GHOST_VERSION }}
