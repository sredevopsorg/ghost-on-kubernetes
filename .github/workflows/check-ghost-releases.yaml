---
# Automate rebuilding new "-docker" releases when Ghost has a new release.
name: Check Ghost Releases

on:
  schedule:
    - cron: '0 */12 * * *'  # Every 12 hours
  workflow_dispatch:  # Allow manual trigger
  workflow_call: # Allow this workflow to be called by other workflows

permissions:
  contents: read

jobs:
  check-ghost-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      artifact-metadata: read
      packages: read
      actions: read
    outputs:
      version: ${{ steps.ghost.outputs.version }}
      build_needed: ${{ steps.check.outputs.build_needed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Get latest Ghost version
        id: ghost
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/tryghost/ghost/releases/latest | jq -r '.name')
          echo "Latest Ghost version: $LATEST_VERSION"
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
      
      - name: Get last built version
        id: last-built
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          PACKAGE="${{ github.event.repository.name }}"

          LAST_BUILT=$(gh api \
            "/orgs/${OWNER}/packages/container/${PACKAGE}/versions" \
            --paginate \
            --jq '.[].metadata.container.tags[]' 2>/dev/null | \
            grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-docker$' | \
            sed 's/-docker$//' | sort -V | tail -n1)

          if [ -z "$LAST_BUILT" ]; then
            echo "No previous build found"
            echo "version=none" >> $GITHUB_OUTPUT
          else
            echo "Last built version: $LAST_BUILT"
            echo "version=$LAST_BUILT" >> $GITHUB_OUTPUT
          fi
      
      - name: Check if build needed
        id: check
        run: |
          LATEST="${{ steps.ghost.outputs.version }}"
          LAST_BUILT="${{ steps.last-built.outputs.version }}"
          
          echo "Latest: $LATEST"
          echo "Last built: $LAST_BUILT"
          
          if [ -n "$LAST_BUILT" ] && [ "$LAST_BUILT" != "none" ] && [ "$LAST_BUILT" != "$LATEST" ] && [ "$(printf '%s\n%s\n' "$LAST_BUILT" "$LATEST" | sort -V | head -1)" == "$LAST_BUILT" ]; then
            echo "New version detected - build needed"
            echo "build_needed=true" >> $GITHUB_OUTPUT
          else
            echo "Already up to date"
            echo "build_needed=false" >> $GITHUB_OUTPUT
          fi

  trigger-build:
    needs: check-ghost-releases
    runs-on: ubuntu-latest
    permissions:
      contents: read
      artifact-metadata: read
      packages: read
      actions: read
    outputs:
      version: ${{ needs.check-ghost-releases.outputs.version }}
      manual-tag: "auto"
    steps:
      - name: Exit with error if build not needed, otherwise exit with success
        id: conditional-check
        run: |
          if [ "${{ needs.check-ghost-releases.outputs.build_needed }}" != "true" ]; then
            echo "No build needed, exiting with error to prevent downstream steps from running"
            exit 1
          else
            echo "Build needed, exiting with success to allow downstream steps to run"
            exit 0
          fi
