apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: k8s-ghost-content
  namespace: ghost-on-kubernetes
  labels:
    app: ghost-on-kubernetes
    app.kubernetes.io/name: k8s-ghost-content
    app.kubernetes.io/instance: ghost-on-kubernetes
    app.kubernetes.io/version: "5.88"
    app.kubernetes.io/component: ghost-pvc
    app.kubernetes.io/part-of: ghost-on-kubernetes
    app.kubernetes.io/managed-by: sredevopsorg
spec:
  storageClassName: default # Change this to your storageClassName, we suggest using a storageClassName that supports ReadWriteMany for production.
  volumeMode: Filesystem
  # Change this to your accessModes. We suggest ReadWriteMany for production, ReadWriteOnce for development.
  # With ReadWriteMany, you can have multiple replicas of Ghost, so you can achieve high availability.
  # Note that ReadWriteMany is not supported by all storage providers and may require additional configuration.
  # Ghost officialy doesn't support HA, they suggest using a CDN or caching. Info: https://ghost.org/docs/faq/clustering-sharding-multi-server/
  accessModes:
  - ReadWriteOnce 
  resources:
    requests:
      storage: 1Gi # Change this to your storage size, if you are planning to use this for production, we suggest at least 5Gi.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-ghost-on-kubernetes-pvc
  namespace: ghost-on-kubernetes
  labels:
    app: mysql-ghost-on-kubernetes
    app.kubernetes.io/name: mysql-ghost-on-kubernetes-pvc
    app.kubernetes.io/instance: ghost-on-kubernetes
    app.kubernetes.io/version: "5.88"
    app.kubernetes.io/component: mysql-pvc
    app.kubernetes.io/part-of: ghost-on-kubernetes
    app.kubernetes.io/managed-by: sredevopsorg

spec:
  storageClassName: default # Change this to your storageClassName
  volumeMode: Filesystem
  accessModes:
  - ReadWriteOnce # Change this if you need.
  resources:
    requests:
      storage: 1Gi # Change this to your storage size, if you are planning to use this for production, we suggest at least 5Gi.

